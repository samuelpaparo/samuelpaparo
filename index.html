<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photography Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#about">About Me</a></li>
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
        <h1>My Photography Portfolio</h1>
    </header>
    <section id="about">
        <h2>About Me</h2>
        <p>Hi, I'm [Your Name], a passionate photographer with a love for capturing the beauty of the world. Welcome to my portfolio!</p>
    </section>
    <section id="gallery">
        <h2>Gallery</h2>
        <div class="grid-container">
            <div class="grid-item"><img src="photo1.jpg" alt="Photo 1"></div>
            <div class="grid-item"><img src="photo2.jpg" alt="Photo 2"></div>
            <div class="grid-item"><img src="photo3.jpg" alt="Photo 3"></div>
            <div class="grid-item"><img src="photo4.jpg" alt="Photo 4"></div>
            <!-- Add more photos as needed -->
        </div>
    </section>
    <section id="contact">
        <h2>Contact</h2>
        <form action="https://formspree.io/f/yourformid" method="POST">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>
    <footer>
        <p>&copy; 2024 [Your Name]. All rights reserved.</p>
    </footer>
</body>
</html>
