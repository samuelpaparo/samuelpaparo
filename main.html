<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Photography Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Additional CSS for launch page */
        .launch-container {
            background-image: url('background_image.jpg'); /* Replace 'background_image.jpg' with your image path */
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: 'Courier New', Courier, monospace; /* Vintage font */
        }
        .enter-button {
            background-color: transparent;
            border: 2px solid #fff;
            color: #fff;
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .enter-button:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="launch-container">
        <button class="enter-button" onclick="window.location.href='index.html'">Enter</button>
    </div>
</body>
</html>
